services:
  bot:
    image: ghcr.io/butterdevelop/tg_chatgpt_bot:latest
    container_name: tg-gpt-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/chatgpt_tg.db
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 300M
        reservations:
          memory: 128M
